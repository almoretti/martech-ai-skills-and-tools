name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: pip install . ruff
      - name: Lint
        run: ruff check src/
      - name: Smoke test CLI
        run: |
          gmc --version
          gmc --help
          gmc products --help
          gmc report --help
          python -m gmc_cli --help
